services:
  postgres:
    image: postgres:16
    container_name: mcp-postgres-db
    restart: always
    environment:
      POSTGRES_DB: mcpdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mcp:
    build: .
    container_name: mcp-server
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mcpdb
      DB_USER: postgres
      DB_PASSWORD: postgres123
    command: ["node", "build/index.js"]

volumes:
  postgres_data: